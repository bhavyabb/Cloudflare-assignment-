#:schema node_modules/wrangler/config-schema.json
name = "feedbackpulse"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "feedbackpulse-db"
database_id = "REPLACE_ME"

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_ME"

[[r2_buckets]]
binding = "R2"
bucket_name = "feedbackpulse-data"

[ai]
binding = "AI"

[[workflows]]
name = "feedback-pipeline"
binding = "FEEDBACK_PIPELINE"
class_name = "FeedbackPipelineWorkflow"
